openapi: 3.0.0
info:
  title: Api Regional Wilayah Indonesia
  description: >-
    Complete API collection for Indonesian regional data including provinces,
    regencies, districts, villages, and postal codes.


    ## Features

    - Access to all Indonesian provinces, regencies, districts, and villages

    - Hierarchical navigation (province → regency → district → village)

    - Search across all regional types by name or postal code

    - Postal code queries

    - Name-based filtering

    - Pagination support

    - Premium endpoints for advanced search and postal code access


    ## Authentication

    All requests require an API key in the `x-api-co-id` header.


    ## Premium Endpoints

    The following endpoints require a premium subscription:

    - `/regional/indonesia/search` - Advanced search by name or postal code

    - `/regional/indonesia/postal-codes` - List all postal codes

    - `/regional/indonesia/postal-codes/:postal_code` - Get villages by postal code


    ## Base URL

    ```

    https://use.api.co.id/regional/indonesia

    ```


    ## Data Structure

    - **Province** (Provinsi) - 34 provinces

    - **Regency** (Kabupaten/Kota) - Cities and regencies

    - **District** (Kecamatan) - Subdistricts

    - **Village** (Kelurahan/Desa) - Villages and urban wards

    - **Postal Code** (Kode Pos) - Postal codes linked to villages
  version: 1.0.0
servers:
  - url: https://use.api.co.id
tags:
  - name: Provinces
    description: Endpoints for accessing province data.
  - name: Regencies
    description: Endpoints for accessing regency/city data.
  - name: Districts
    description: Endpoints for accessing district data.
  - name: Villages
    description: Endpoints for accessing village data.
  - name: Postal Codes (Premium)
    description: Endpoints for accessing postal code data. All postal code endpoints require premium subscription.
  - name: Search (Premium)
    description: Endpoints for searching regional data. Search endpoint requires premium subscription.
paths:
  /regional/indonesia/provinces:
    get:
      tags:
        - Provinces
      summary: List All Provinces
      description: >-
        Get all provinces in Indonesia.


        ### Query Parameters

        - `name` (optional): Filter by province name (case-insensitive partial match)

        - `page` (optional): Page number (default: 1)

        - **Note:** Pagination size is fixed at 100 items per page and cannot be configured


        ### Examples

        ```bash
        # Get all provinces
        GET /regional/indonesia/provinces

        # Search provinces by name
        GET /regional/indonesia/provinces?name=jawa

        # With pagination
        GET /regional/indonesia/provinces?page=1
        ```
      parameters:
        - name: x-api-co-id
          in: header
          schema:
            type: string
          description: Your API key for authentication
          example: '{{api_key}}'
        - name: name
          in: query
          schema:
            type: string
          required: false
          description: Filter by province name (case-insensitive partial match)
          example: jawa
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          required: false
          description: Page number
          example: 1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              examples:
                success:
                  summary: Success - All Provinces
                  value:
                    is_success: true
                    message: Success
                    data:
                      - code: '11'
                        name: ACEH
                      - code: '12'
                        name: SUMATERA UTARA
                      - code: '13'
                        name: SUMATERA BARAT
                    paging:
                      page: 1
                      size: 100
                      total_item: 34
                      total_page: 1
        '401':
          description: Unauthorized
          content:
            application/json:
              examples:
                Missing API Key:
                  summary: Missing API Key
                  value:
                    is_success: false
                    message: 'Missing API key in x-api-co-id header'
        '429':
          description: Too Many Requests
          content:
            application/json:
              examples:
                Rate Limit Exceeded:
                  summary: Rate Limit Exceeded
                  value:
                    is_success: false
                    message: 'Rate limit exceeded. Please try again later'
