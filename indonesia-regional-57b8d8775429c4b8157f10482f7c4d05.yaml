  /regional/indonesia/search:
    get:
      tags:
        - Search (Premium)
      summary: Search Regional Data
      description: >-
        Search across all regional data types by name or postal code. **This endpoint requires a premium subscription.**


        ### Query Parameters

        - `query` (required): Search term (can be a name or postal code)

        - `type` (optional): Filter by type (province, regency, district, village)

        - `page` (optional): Page number

        - **Note:** Pagination size is fixed at 100 items per page and cannot be configured


        ### Examples

        ```bash
        # Search by name
        GET /regional/indonesia/search?query=jakarta

        # Search by postal code
        GET /regional/indonesia/search?query=12210

        # Search only villages
        GET /regional/indonesia/search?query=bantul&type=village
        ```


        ### Error Responses

        - `403 Forbidden`: User is not a premium member

        - `401 Unauthorized`: User not authenticated
      parameters:
        - name: x-api-co-id
          in: header
          schema:
            type: string
          description: Your API key for authentication
          example: '{{api_key}}'
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Search term (required) - can be a name (province, regency, district, village) or postal code
          example: jakarta
        - name: type
          in: query
          schema:
            type: string
            enum:
              - province
              - regency
              - district
              - village
          required: false
          description: 'Filter by type: province, regency, district, village (optional)'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          required: false
          description: Page number (optional)
          example: 1
